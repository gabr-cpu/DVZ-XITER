<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVZ - O Melhor do Brasil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        /* Primeira Parte: Sua Imagem ocupando a tela inteira */
        .hero-section {
            height: 100vh;
            width: 100%;
            background: url('https://straightforward-coffee-37zs237u1w.edgeone.app/dvz.png') no-repeat center center;
            background-size: contain; /* Mantém a imagem inteira sem cortar os textos dela */
            background-attachment: fixed; /* Efeito Parallax */
        }

        /* Segunda Parte: O Convite */
        .invite-section {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
            padding: 20px;
            border-top: 2px solid #5865F2;
        }

        .invite-section h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .invite-section p {
            font-size: 1.3rem;
            color: #b9bbbe;
            margin-bottom: 30px;
        }

        /* Botão Estilizado */
        .btn-discord {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-discord:hover {
            background-color: #4752c4;
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.8);
        }

        /* Animação simples */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .hero-section {
                background-size: cover; /* No celular, cobre a tela pra não sobrar espaço */
            }
            .invite-section h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="hero-section"></div>

    <div class="invite-section">
        <h2>E aí, o que achou?</h2>
        <p>Vem, entra pro melhor grupo de xit do Brasil!</p>
        
        <a href="https://discord.gg/5Q2qqr8vQy" class="btn-discord pulse">
