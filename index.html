<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVZ - Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #000;
            overflow: hidden;
            color: white;
        }

        /* Fundo com a sua imagem */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://straightforward-coffee-37zs237u1w.edgeone.app/dvz.png') no-repeat center center;
            background-size: contain;
            z-index: 1;
        }

        /* Camada de transparência/escurecimento */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Ajuste o 0.4 para mais ou menos transparência */
            z-index: 2;
        }

        /* Container de Conteúdo */
        .content-container {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
            text-align: center;
        }

        /* Telas */
        .step {
            transition: all 0.5s ease;
            width: 90%;
            max-width: 500px;
        }

        .hidden {
            display: none;
            opacity: 0;
            transform: translateY(30px);
        }

        /* Botões */
        .btn {
            display: inline-block;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-next {
            background: white;
            color: black;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #ddd;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* Animação simples de fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s forwards;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <div class="content-container">
        
        <div id="step1" class="step">
            <button class="btn btn-next" onclick="goStep2()">AVANÇAR PARA O SERVIDOR</button>
        </div>

        <div id="step2" class="step hidden">
            <h2>E aí, o que achou?</h2>
            <p>Vem, entra pro melhor grupo de xit do Brasil!</p>
            <a href="https://discord.gg/5Q2qqr8vQy" class="btn btn-discord">ENTRAR AGORA</a>
        </div>

    </div>

    <script>
        function goStep2() {
            // Esconde a primeira parte com animação
            const s1 = document.getElementById('step1');
            const s2 = document.getElementById('step2');
            
            s1.style.opacity = '0';
            
            setTimeout(() => {
                s1.classList.add('hidden');
                s2.classList.remove('hidden');
                s2.classList.add('fade-in');
                
                // Opcional: Aumentar o desfoque do fundo ao chegar na parte final
                document.querySelector('.overlay').style.background = "rgba(0, 0, 0, 0.7)";
                document.querySelector('.overlay').style.backdropFilter = "blur(10px)";
            }, 400);
        }
    </script>

</body>
</html>
